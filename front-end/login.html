<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErrTrack — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">
                <img src="img/logo.png" width="50px" height="50px">
            </div>
            <div class="login-logo-text">
                <div class="logo-name">ErrTrack</div>
                <div class="logo-sub">QA System</div>
            </div>
        </div>

        <div class="login-title">Bem-vindo de volta</div>
        <div class="login-sub">Faça login para acessar o painel</div>

        <div class="login-fields">
            <!-- E-mail -->
            <div class="fg" style="margin-bottom:0">
                <label class="fl">Usuário</label>
                <div class="login-field-wrap">
                    <svg class="login-field-icon" viewBox="0 0 24 24">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input class="fi login-input" id="login-usuario" type="text" placeholder="Usuário" autocomplete="off">
                </div>
            </div>

            <!-- Senha -->
            <div class="fg" style="margin-bottom:0">
                <label class="fl">Senha</label>
                <div class="login-field-wrap">
                    <svg class="login-field-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input class="fi login-input" id="login-senha" type="password" placeholder="••••••••">
                    <button class="pw-toggle" id="pw-toggle" type="button" title="Mostrar senha">
                        <svg id="eye-icon" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="login-options">
            <label class="login-check">
                <input type="checkbox" id="lembrar">
                Lembrar de mim
            </label>
            <a href="#" class="login-forgot">Esqueci a senha</a>
        </div>

        <button class="btn-login" id="btn-login" onclick="fazerLogin()">
            Entrar
        </button>

        <div class="login-error" id="login-error">
            Usuário ou senha incorretos. Tente novamente.
        </div>

    </div>
</div>

<button class="theme-btn" id="theme-btn" title="Alternar tema">🌙</button>

<script src="js/login.js"></script>
<script src="/static/conectaapi.js"></script>
</body>
</html>
